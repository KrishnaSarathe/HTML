<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>
<!-- relative path  -->
    <img src="Gojo.jpg" alt="Gojo" width="500px" height="500px">
<!-- absolute path -->
    <img src="https://i.pinimg.com/236x/db/da/fe/dbdafe047c26c0204a5a23b9d3bcbc47.jpg" alt="Satoru" width="500px" height="500px">
</body>
</html>

<!-- In HTML, the `<img>` tag is used to embed images in a web page. The `src` attribute specifies the URL of the image you want to display, while the `alt` attribute provides alternative text that describes the image for accessibility purposes.

    - The `src` attribute can point to an image file located on the same server or an external URL. It's important to ensure that the image path is correct to avoid broken images on your webpage.
    - The `alt` attribute is crucial for accessibility, as it allows screen readers to describe the image to users who are visually impaired. It also serves as a fallback if the image fails to load.
    - You can use CSS to style images, such as adjusting their size, adding borders, or applying filters. This can enhance the visual appeal of your webpage and improve user experience.
    - When using images on a website, it's important to optimize them for web use by reducing their file size without compromising quality. This helps improve page load times and overall performance. -->
    <!-- In HTML, paths are how you tell the browser where to find files like images, stylesheets, or other pages. There are two main types:

1. Absolute Path
Points to the full location of a file on the web.

Example:

html
<img src="https://example.com/images/sunset.jpg" alt="Sunset">
Always starts with http:// or https://.

2. Relative Path
Points to a file relative to the location of your HTML file.

Example:

html
<img src="images/sunset.jpg" alt="Sunset">
Here, the browser looks for a folder called images in the same directory as your HTML file. -->
