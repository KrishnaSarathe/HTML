<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colspan</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="5">Name</th>
        </tr>
        <tr>
            <td>Ashish</td>
        </tr>
        <tr>
            <td>Ajay</td>
        </tr>
        <tr>
            <td>Aman</td>
        </tr>
        <tr>
            <td>Atharva</td>
        </tr>
        <tr>
            <td>Aditya</td>
        </tr>

    </table>
</body>
</html>
<!-- In HTML, the `colspan` attribute is used in table cells (`<td>` or `<th>`) to specify how many columns a cell should span across. 
    This allows you to create cells that extend across multiple columns, which can be useful for creating headers or grouping related data together.
