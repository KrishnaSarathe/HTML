<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings</title>
</head>
<body>
    <h1>This is a heading1</h1>
    <h2>This is a heading2</h2>
    <h3>This is a heading3</h3>
    <h4>This is a heading4</h4>
    <h5>This is a heading5</h5>
    <h6>This is a heading6</h6>
</body>
</html>

<!-- In HTML, headings are defined with the `<h1>` to `<h6>` tags, where `<h1>` represents the highest level of heading and `<h6>` represents the lowest level. Headings are used to structure content and provide a clear hierarchy for both users and search engines. 

    - `<h1>`: This is the most important heading and is typically used for the main title of a page or section.
    - `<h2>`: This is used for subheadings under `<h1>`.
    - `<h3>`: This is used for subheadings under `<h2>`, and so on down to `<h6>`.

It's important to use headings in a logical order to maintain the structure of your content. For example, you should not skip from `<h1>` directly to `<h4>`, as this can confuse both users and search engines about the hierarchy of your content. Proper use of headings can improve readability and SEO (Search Engine Optimization) for your web pages. -->
<!-- in headings only use h1 once to define the main title of the page -->
