<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <button>Click Me</button>
    
</body>
</html>

<!-- In HTML, the `<button>` tag is used to create a clickable button on a web page. The content inside the `<button>` tags is what will be displayed on the button itself. 

    - The `<button>` element can contain text, images, or other HTML elements, making it versatile for various types of buttons.
    - You can use the `type` attribute to specify the behavior of the button, such as `submit`, `reset`, or `button`. By default, if no type is specified, it behaves as a `submit` button when placed inside a form.
    - Buttons can be styled using CSS to enhance their appearance and make them more visually appealing. You can change their color, size, shape, and add hover effects to improve user interaction.
    - It's important to ensure that buttons are accessible and provide clear indications of their purpose to users, especially those using assistive technologies. Proper labeling and ARIA attributes can help improve accessibility for all users. -->
