<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <tr>
            <th rowspan="1">Name</th>
            <th rowspan="1">Subject</th>
        </tr>
        <tr>
            <td>Aman</td>
            <td>
                <table border="10">
                    <tr>
                        <td>Maths</td>
                    </tr>
                    <tr>
                        <td>Science</td>
                    </tr>
                </table>
        </tr>
        <tr>
            <td>Ajay</td>
            <td>
                <table border="10">
                    <tr>
                        <td>Python</td>
                    </tr>
                </table>
        </tr>
        <tr>
            <td>Aakash</td>
            <td>
                <table border="10">
                    <tr>
                        <td>Html</td>
                    </tr>
                    <tr>
                        <td>CSS</td>
                    </tr>
                </table>
        </tr>
    </table>
</body>
</html>

<!-- In HTML, the rowspan attribute is used to specify the number of rows that an element should span. -->
