<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            flex-direction: row;
            background-color: rgb(235, 221, 221);
            border: 5px solid black;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 200px;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: #91ddf4;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 5px solid black;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .box img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"><img src="Gojo.jpg" alt="Image 1"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 2"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 3"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 4"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 5"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 6"></div>   
        <div class="box"><img src="Gojo.jpg" alt="Image 7"></div>
        <div class="box"><img src="Gojo.jpg" alt="Image 8"></div>
    </div>
</body>

</html>
